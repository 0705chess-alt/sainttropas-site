<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>대장간 - 검 강화</title>
<style>
  :root{
    --bg-deep: #14100c;
    --bg-panel: #1f1811;
    --ember: #ff7a3d;
    --gold: #e8b84b;
    --danger: #c23b3b;
    --safe: #4a9d6e;
    --text: #ede4d3;
    --text-dim: #a89a82;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background:
      radial-gradient(ellipse at 50% 20%, #2a1c10 0%, var(--bg-deep) 55%),
      var(--bg-deep);
    color: var(--text);
    font-family: 'Noto Sans KR', 'Malgun Gothic', sans-serif;
    display: flex;
    justify-content: center;
    padding: 32px 16px;
  }
  .stage { width: 100%; max-width: 480px; }
  h1 {
    font-size: 22px;
    text-align: center;
    letter-spacing: 4px;
    color: var(--ember);
    margin: 0 0 4px;
    text-shadow: 0 0 18px rgba(255,122,61,0.5);
  }
  .sub { text-align: center; color: var(--text-dim); font-size: 12px; margin-bottom: 20px; letter-spacing: 2px; }
  .topbar {
    display: flex;
    justify-content: space-between;
    background: var(--bg-panel);
    border: 1px solid #3a2c1c;
    border-radius: 10px;
    padding: 10px 16px;
    margin-bottom: 18px;
    font-size: 13px;
  }
  .topbar .gold { color: var(--gold); font-weight: bold; }
  .forge {
    background: radial-gradient(ellipse at 50% 30%, #2e1c10 0%, var(--bg-panel) 70%);
    border: 1px solid #3a2c1c;
    border-radius: 14px;
    padding: 30px 16px 20px;
    text-align: center;
    position: relative;
    min-height: 330px;
  }
  .level-badge { font-size: 30px; font-weight: 900; letter-spacing: 1px; margin-bottom: 6px; transition: color 0.3s; }
  .tier-label { font-size: 11px; letter-spacing: 3px; color: var(--text-dim); margin-bottom: 10px; }
  .tier-track { font-size: 10px; color: var(--text-dim); margin-bottom: 14px; }
  #swordWrap { height: 200px; display: flex; align-items: flex-end; justify-content: center; }
  #swordSvg { width: 130px; height: 200px; transition: filter 0.3s, transform 0.4s ease; overflow: visible; }
  #swordSvg.level-up-pulse { animation: levelPulse 0.55s ease; }
  @keyframes levelPulse {
    0% { transform: scale(var(--sword-scale, 1)); }
    35% { transform: scale(calc(var(--sword-scale, 1) * 1.25)) rotate(-4deg); }
    60% { transform: scale(calc(var(--sword-scale, 1) * 0.95)) rotate(3deg); }
    100% { transform: scale(var(--sword-scale, 1)) rotate(0deg); }
  }
  #swordSvg.shatter { animation: shatterShake 0.5s ease; }
  @keyframes shatterShake {
    0%,100% { transform: scale(var(--sword-scale,1)) translateX(0); }
    20% { transform: scale(calc(var(--sword-scale,1)*0.9)) translateX(-8px) rotate(-6deg); }
    40% { transform: scale(calc(var(--sword-scale,1)*0.9)) translateX(8px) rotate(6deg); }
    60% { transform: scale(calc(var(--sword-scale,1)*0.85)) translateX(-5px) rotate(-3deg); }
    80% { transform: scale(calc(var(--sword-scale,1)*0.95)) translateX(5px) rotate(2deg); }
  }
  .flame { animation: flicker 0.6s ease-in-out infinite alternate; transform-origin: 50px 30px; }
  .flame.f2 { animation-delay: 0.15s; }
  .flame.f3 { animation-delay: 0.3s; }
  @keyframes flicker {
    from { transform: scaleY(1) translateY(0); opacity: 0.85; }
    to { transform: scaleY(1.18) translateY(-3px); opacity: 1; }
  }
  #aura { animation: auraPulse 2.2s ease-in-out infinite; transform-origin: 50px 80px; }
  @keyframes auraPulse {
    0%, 100% { opacity: 0.15; transform: scale(1); }
    50% { opacity: 0.45; transform: scale(1.1); }
  }
  .particle {
    position: absolute;
    width: 6px; height: 6px;
    border-radius: 50%;
    pointer-events: none;
    left: 50%; top: 46%;
    animation: particleFly 0.75s ease-out forwards;
  }
  @keyframes particleFly { to { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; } }
  .float-text {
    position: absolute;
    left: 50%; top: 40%;
    transform: translateX(-50%);
    font-size: 20px;
    font-weight: 900;
    pointer-events: none;
    animation: floatUp 1s ease-out forwards;
    text-shadow: 0 0 10px rgba(0,0,0,0.6);
    white-space: nowrap;
  }
  @keyframes floatUp {
    0% { opacity: 0; transform: translate(-50%, 10px) scale(0.8); }
    20% { opacity: 1; transform: translate(-50%, -10px) scale(1.1); }
    100% { opacity: 0; transform: translate(-50%, -55px) scale(1); }
  }
  .stats {
    display: flex; justify-content: center; gap: 18px;
    margin-top: 10px; font-size: 12px; color: var(--text-dim); flex-wrap: wrap;
  }
  .stats b { color: var(--text); }
  .action-row { margin-top: 22px; display: flex; flex-direction: column; gap: 10px; }
  .btn-pair { display: flex; gap: 10px; }
  .btn-pair button { flex: 1; }
  button {
    font-family: inherit; border: none; border-radius: 8px; padding: 13px;
    font-size: 14px; font-weight: 700; cursor: pointer;
    transition: transform 0.08s, filter 0.15s; letter-spacing: 1px;
  }
  button:active { transform: scale(0.97); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-enhance { background: linear-gradient(135deg, var(--ember), #d9531f); color: #1a0d05; box-shadow: 0 0 20px rgba(255,122,61,0.35); }
  .btn-enhance:hover:not(:disabled) { filter: brightness(1.1); }
  .btn-hunt { background: var(--bg-panel); border: 1px solid #4a3a26 !important; color: var(--text); font-size: 13px; }
  .btn-hunt:hover:not(:disabled) { filter: brightness(1.3); }
  .btn-sell { background: var(--bg-panel); border: 1px solid #5a4326 !important; color: var(--gold); font-size: 13px; }
  .btn-sell:hover:not(:disabled) { filter: brightness(1.3); }
  .btn-scroll { background: var(--bg-panel); border: 1px solid #305a44 !important; color: var(--safe); font-size: 12px; padding: 10px; }
  .risk-note { font-size: 11px; color: var(--danger); margin-top: 4px; min-height: 14px; }
  .risk-note.protected { color: var(--safe); }
  .log {
    margin-top: 18px; background: var(--bg-panel); border: 1px solid #3a2c1c; border-radius: 10px;
    padding: 10px 14px; height: 110px; overflow-y: auto; font-size: 12px; color: var(--text-dim);
    display: flex; flex-direction: column-reverse;
  }
  .log div { padding: 3px 0; border-bottom: 1px solid #2a2117; }
  .log .success { color: var(--safe); }
  .log .fail { color: var(--danger); }
  .log .info { color: var(--gold); }
  .flash { position: absolute; inset: 0; pointer-events: none; opacity: 0; border-radius: 14px; }
  .flash.success { background: radial-gradient(circle, rgba(232,184,75,0.35), transparent 70%); animation: pulse 0.5s ease-out; }
  .flash.fail { background: radial-gradient(circle, rgba(194,59,59,0.4), transparent 70%); animation: pulse 0.5s ease-out; }
  @keyframes pulse { from { opacity: 1; } to { opacity: 0; } }
  .shake { animation: shake 0.35s; }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-6px); } 40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); } 80% { transform: translateX(4px); }
  }
</style>
</head>
<body>
<div class="stage">
  <h1>대 장 간</h1>
  <div class="sub">SWORD ENHANCEMENT · MAX +50</div>

  <div class="topbar">
    <div>골드 <span class="gold" id="goldDisplay">0</span></div>
    <div>투자 골드 <span id="investedDisplay" style="color:var(--gold)">0</span></div>
    <div>주문서 <span id="scrollDisplay" style="color:var(--safe)">0</span>개</div>
  </div>

  <div class="forge" id="forge">
    <div class="flash" id="flash"></div>
    <div class="level-badge" id="levelBadge">+0</div>
    <div class="tier-label" id="tierLabel">평범한 검</div>
    <div class="tier-track" id="tierTrack">1 / 10 단계</div>
    <div id="swordWrap">
      <svg id="swordSvg" viewBox="0 0 100 160">
        <defs>
          <linearGradient id="bladeGrad" x1="0" y1="0" x2="0" y2="1">
            <stop id="gradTop" offset="0%" stop-color="#dfe6ec"/>
            <stop id="gradBottom" offset="100%" stop-color="#8a94a6"/>
          </linearGradient>
        </defs>

        <circle id="aura" cx="50" cy="80" r="65" fill="none" stroke="#e8b84b" stroke-width="2" opacity="0"/>

        <g id="flameTip" opacity="0">
          <path class="flame f1" d="M50 5 Q45 -10 50 -20 Q55 -10 50 5 Z" fill="#ff7a3d"/>
          <path class="flame f2" d="M42 9 Q37 -1 41 -9 Q45 -1 42 9 Z" fill="#ffb347"/>
          <path class="flame f3" d="M58 9 Q63 -1 59 -9 Q55 -1 58 9 Z" fill="#ffb347"/>
        </g>

        <polygon id="blade" points="50,5 60,20 57,110 50,125 43,110 40,20" fill="url(#bladeGrad)" stroke="#556070" stroke-width="1.5"/>

        <g id="wings" opacity="0">
          <path d="M38 118 L18 110 L25 124 L38 122 Z" fill="#c46bff" stroke="#8a3fd1" stroke-width="1"/>
          <path d="M62 118 L82 110 L75 124 L62 122 Z" fill="#c46bff" stroke="#8a3fd1" stroke-width="1"/>
        </g>

        <rect x="38" y="118" width="24" height="8" rx="2" fill="#3a2c1c"/>
        <circle id="gem" cx="50" cy="122" r="4.5" fill="#6fb8ff" opacity="0"/>
        <rect x="47" y="126" width="6" height="28" rx="2" fill="#5c4326"/>
        <circle cx="50" cy="154" r="7" fill="#e8b84b"/>
      </svg>
    </div>
    <div class="stats">
      <div>공격력 <b id="atkDisplay">10</b></div>
      <div>성공확률 <b id="chanceDisplay">92%</b></div>
      <div>최고기록 <b id="bestDisplay">+0</b></div>
    </div>
  </div>

  <div class="action-row">
    <button class="btn-enhance" id="enhanceBtn">강화하기 (비용: <span id="costDisplay">12</span>G)</button>
    <div class="risk-note" id="riskNote"></div>
    <div class="btn-pair">
      <button class="btn-hunt" id="huntBtn">몬스터 사냥 (+5~15G)</button>
      <button class="btn-sell" id="sellBtn">검 판매 (<span id="sellPrice">0</span>G)</button>
    </div>
    <button class="btn-scroll" id="scrollBtn">보호 주문서 구매 (<span id="scrollCost">30</span>G) — 실패 시 파괴 방지</button>
  </div>

  <div class="log" id="log"></div>
</div>

<script>
  const state = { gold: 60, level: 0, best: 0, scrolls: 0, invested: 0 };

  const maxLevel = 50;

  const successRate = (lvl) => Math.max(3, Math.round(90 - lvl * 1.9));
  const enhanceCost = (lvl) => Math.round(12 * Math.pow(1.62, lvl));
  const scrollCost = () => Math.round(25 + state.level * 9);
  const atkPower = (lvl) => 10 + lvl * lvl * 4;
  const sellPrice = () => Math.round(state.invested * 0.55);

  const tiers = [
    { name: "평범한 검",   top: "#dfe6ec", bottom: "#8a94a6", glow: "#dfe6ec" },
    { name: "빛나는 검",   top: "#bfe0ff", bottom: "#5a8fd6", glow: "#6fb8ff" },
    { name: "정령의 검",   top: "#e6c7ff", bottom: "#9a4fd1", glow: "#c46bff" },
    { name: "화염의 검",   top: "#ffdca0", bottom: "#e8760f", glow: "#ff7a3d" },
    { name: "얼음의 검",   top: "#d8f6ff", bottom: "#4fb8d9", glow: "#7fe0ff" },
    { name: "뇌전의 검",   top: "#fff6b0", bottom: "#e0c020", glow: "#ffe45c" },
    { name: "암흑의 검",   top: "#b6a6f0", bottom: "#2a1f4a", glow: "#8a5cff" },
    { name: "천상의 검",   top: "#ffffff", bottom: "#cfd8ff", glow: "#eaf1ff" },
    { name: "용의 검",     top: "#ff9a6a", bottom: "#8f1d1d", glow: "#ff4d4d" },
    { name: "신화의 검",   top: "#fff2c2", bottom: "#e8b84b", glow: "#ffd75e" },
  ];
  const tierOf = (lvl) => tiers[Math.min(tiers.length - 1, Math.floor(lvl / 5))];
  const tierIndexOf = (lvl) => Math.min(tiers.length - 1, Math.floor(lvl / 5));

  const el = id => document.getElementById(id);

  function log(msg, cls) {
    const div = document.createElement('div');
    div.textContent = msg;
    if (cls) div.className = cls;
    el('log').prepend(div);
  }

  function flash(type) {
    const f = el('flash');
    f.className = 'flash ' + type;
    void f.offsetWidth;
    f.className = 'flash ' + type;
  }

  function shake() {
    const forge = el('forge');
    forge.classList.remove('shake');
    void forge.offsetWidth;
    forge.classList.add('shake');
  }

  function pulseSword() {
    const sword = el('swordSvg');
    sword.classList.remove('level-up-pulse');
    void sword.offsetWidth;
    sword.classList.add('level-up-pulse');
  }

  function shatterSword() {
    const sword = el('swordSvg');
    sword.classList.remove('shatter');
    void sword.offsetWidth;
    sword.classList.add('shatter');
  }

  function spawnParticles(color, count = 14) {
    const forge = el('forge');
    for (let i = 0; i < count; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.background = color;
      const angle = Math.random() * Math.PI * 2;
      const dist = 35 + Math.random() * 55;
      p.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
      p.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
      forge.appendChild(p);
      setTimeout(() => p.remove(), 750);
    }
  }

  function popupText(text, color) {
    const forge = el('forge');
    const t = document.createElement('div');
    t.className = 'float-text';
    t.textContent = text;
    t.style.color = color;
    forge.appendChild(t);
    setTimeout(() => t.remove(), 1000);
  }

  function render() {
    el('goldDisplay').textContent = state.gold;
    el('investedDisplay').textContent = state.invested;
    el('scrollDisplay').textContent = state.scrolls;
    el('levelBadge').textContent = '+' + state.level;
    el('bestDisplay').textContent = '+' + state.best;
    el('atkDisplay').textContent = atkPower(state.level);

    const tier = tierOf(state.level);
    const tIdx = tierIndexOf(state.level);
    el('tierLabel').textContent = tier.name;
    el('tierTrack').textContent = `${tIdx + 1} / ${tiers.length} 단계`;
    el('levelBadge').style.color = tier.glow;

    el('gradTop').setAttribute('stop-color', tier.top);
    el('gradBottom').setAttribute('stop-color', tier.bottom);

    const scale = 1 + Math.min(state.level, maxLevel) * 0.016;
    el('swordSvg').style.setProperty('--sword-scale', scale);
    el('swordSvg').style.transform = `scale(${scale})`;

    el('swordSvg').style.filter = state.level >= 5
      ? `drop-shadow(0 0 ${6 + tIdx * 3}px ${tier.glow})`
      : 'none';

    el('gem').style.opacity = state.level >= 5 ? 1 : 0;
    el('gem').setAttribute('fill', tier.glow);

    el('wings').style.opacity = state.level >= 10 ? 1 : 0;

    el('flameTip').style.opacity = state.level >= 20 ? 1 : 0;
    el('flameTip').querySelectorAll('.flame').forEach((f, i) => {
      f.setAttribute('fill', i === 0 ? tier.glow : tier.top);
    });

    el('aura').style.opacity = state.level >= 35 ? 1 : 0;
    el('aura').setAttribute('stroke', tier.glow);

    el('sellPrice').textContent = sellPrice();
    el('sellBtn').disabled = state.level === 0;

    if (state.level >= maxLevel) {
      el('enhanceBtn').disabled = true;
      el('enhanceBtn').textContent = '최고 강화 달성!';
      el('chanceDisplay').textContent = '-';
      el('costDisplay').textContent = '-';
      el('riskNote').textContent = '';
    } else {
      const cost = enhanceCost(state.level);
      el('costDisplay').textContent = cost;
      el('chanceDisplay').textContent = successRate(state.level) + '%';
      el('enhanceBtn').disabled = state.gold < cost;
      el('enhanceBtn').textContent = `강화하기 (비용: ${cost}G)`;

      const note = el('riskNote');
      if (state.scrolls > 0) {
        note.textContent = `보호 주문서 보유 중 (실패해도 파괴 방지, ${state.scrolls}개)`;
        note.className = 'risk-note protected';
      } else {
        note.textContent = '실패 시 검이 파괴됩니다 (+0으로 초기화)';
        note.className = 'risk-note';
      }
    }

    el('scrollCost').textContent = scrollCost();
    el('scrollBtn').disabled = state.gold < scrollCost();
  }

  function enhance() {
    if (state.level >= maxLevel) return;
    const cost = enhanceCost(state.level);
    if (state.gold < cost) return;
    state.gold -= cost;
    state.invested += cost;

    const rate = successRate(state.level);
    const roll = Math.random() * 100;

    if (roll < rate) {
      state.level += 1;
      state.best = Math.max(state.best, state.level);
      const tier = tierOf(state.level);
      flash('success');
      pulseSword();
      spawnParticles(tier.glow);
      popupText(`+${state.level}`, tier.glow);
      log(`+${state.level - 1} -> +${state.level} 강화 성공!`, 'success');
    } else {
      flash('fail');
      shake();
      if (state.scrolls > 0) {
        state.scrolls -= 1;
        popupText('방어!', '#4a9d6e');
        log(`강화 실패... 보호 주문서로 검을 지켰습니다.`, 'info');
      } else {
        spawnParticles('#c23b3b', 22);
        shatterSword();
        popupText('파괴!', '#c23b3b');
        log(`강화 실패... 검이 파괴되었습니다! (+${state.level} -> +0)`, 'fail');
        state.level = 0;
        state.invested = 0;
      }
    }
    render();
  }

  function hunt() {
    const reward = 5 + Math.floor(Math.random() * 11);
    state.gold += reward;
    log(`몬스터를 처치하고 ${reward}G를 획득했습니다.`);
    render();
  }

  function sell() {
    if (state.level === 0) return;
    const price = sellPrice();
    state.gold += price;
    log(`+${state.level} 검을 ${price}G에 판매했습니다.`, 'info');
    state.level = 0;
    state.invested = 0;
    render();
  }

  function buyScroll() {
    const cost = scrollCost();
    if (state.gold < cost) return;
    state.gold -= cost;
    state.scrolls += 1;
    log(`보호 주문서를 구매했습니다.`, 'info');
    render();
  }

  el('enhanceBtn').addEventListener('click', enhance);
  el('huntBtn').addEventListener('click', hunt);
  el('sellBtn').addEventListener('click', sell);
  el('scrollBtn').addEventListener('click', buyScroll);

  log('대장간에 오신 것을 환영합니다. 검을 강화해보세요! (최대 +50)');
  render();
</script>
</body>
</html>
